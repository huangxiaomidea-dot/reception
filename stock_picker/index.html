<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A股每日选股 · 次日开盘上涨预测</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:24px 16px}

/* header */
.hd{text-align:center;margin-bottom:28px}
.hd h1{font-size:1.7rem;color:#c0392b;margin-bottom:6px;letter-spacing:1px}
.hd p{color:#888;font-size:.88rem}

/* card */
.card{background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:24px;margin-bottom:18px}
.card-title{font-size:1rem;font-weight:700;color:#333;margin-bottom:18px;
  border-left:4px solid #c0392b;padding-left:10px;display:flex;align-items:center;gap:8px}

/* run button */
.btn-run{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#e74c3c,#c0392b);
  color:#fff;font-size:1.05rem;font-weight:700;border:none;border-radius:10px;
  cursor:pointer;letter-spacing:2px;transition:.2s}
.btn-run:hover{opacity:.9;transform:translateY(-1px)}
.btn-run:disabled{background:#ccc;cursor:not-allowed;transform:none}

/* progress */
.progress-wrap{margin-top:16px;display:none}
.progress-bar{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#f39c12,#e74c3c);border-radius:4px;
  width:0%;transition:width .3s}
.progress-text{font-size:.82rem;color:#888;text-align:center}

/* hero */
.hero{display:flex;align-items:center;gap:24px;flex-wrap:wrap;padding:8px 0}
.hero-left .name{font-size:2.2rem;font-weight:800;color:#c0392b;line-height:1.1}
.hero-left .code{font-size:.9rem;color:#aaa;margin-top:4px}
.hero-right .price{font-size:1.8rem;font-weight:700;color:#222}
.hero-right .chg{font-size:1.1rem;margin-top:4px}
.up{color:#e74c3c}.dn{color:#27ae60}
.score-section{margin-top:20px}
.score-label{font-size:.85rem;color:#666;margin-bottom:8px}
.score-bar{height:16px;background:#f0f0f0;border-radius:8px;overflow:hidden}
.score-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#f39c12,#e74c3c);transition:width .8s ease}
.score-num{font-size:1.4rem;font-weight:700;color:#c0392b;margin-left:8px}

/* detail grid */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:4px}
.detail-item{background:#fafafa;border-radius:8px;padding:10px 12px;border:1px solid #f0f0f0}
.detail-item .di-label{font-size:.75rem;color:#999;margin-bottom:4px}
.detail-item .di-val{font-size:.95rem;font-weight:600}
.di-val.ok{color:#27ae60}.di-val.bad{color:#aaa}.di-val.num{color:#2980b9}

/* table */
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:#f8f8f8;padding:10px 8px;text-align:left;color:#666;font-weight:600;
  border-bottom:2px solid #eee;white-space:nowrap}
td{padding:10px 8px;border-bottom:1px solid #f5f5f5;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.hl td{background:#fff8f8}
.rank-badge{display:inline-block;width:24px;height:24px;border-radius:50%;
  background:#e74c3c;color:#fff;font-size:.75rem;font-weight:700;
  line-height:24px;text-align:center}
.rank-badge.s2{background:#e67e22}.rank-badge.s3{background:#95a5a6}
.rank-badge.other{background:#ecf0f1;color:#888}

/* score mini bar */
.mini-bar{height:6px;background:#eee;border-radius:3px;margin-top:4px;overflow:hidden}
.mini-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f39c12,#e74c3c)}

/* empty/error */
.msg-box{text-align:center;padding:40px;color:#aaa}
.msg-box.error{color:#e74c3c}

/* disclaimer */
.disclaimer{font-size:.75rem;color:#bbb;text-align:center;margin-top:20px;
  padding:12px;background:#fffbe6;border-radius:8px;line-height:1.6}

/* time */
.gen-time{font-size:.8rem;color:#bbb;text-align:right;margin-bottom:6px}

@media(max-width:520px){
  .hero{flex-direction:column;gap:12px;align-items:flex-start}
  .hero-left .name{font-size:1.8rem}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <h1>📈 A股每日选股</h1>
    <p>基于技术指标评分，预测次日开盘上涨概率最大的一支股票</p>
  </div>

  <!-- 运行按钮 -->
  <div class="card">
    <button class="btn-run" id="btnRun" onclick="startPick()">🔍 开始选股分析</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">正在初始化...</div>
    </div>
  </div>

  <!-- 今日推荐 -->
  <div class="card" id="cardBest" style="display:none">
    <div class="card-title">🏆 今日推荐</div>
    <div class="gen-time" id="genTime"></div>
    <div id="bestContent"></div>
  </div>

  <!-- 评分明细 -->
  <div class="card" id="cardDetail" style="display:none">
    <div class="card-title">📊 评分明细</div>
    <div class="detail-grid" id="detailGrid"></div>
  </div>

  <!-- Top 10 -->
  <div class="card" id="cardTop10" style="display:none">
    <div class="card-title">📋 今日 Top 10</div>
    <div style="overflow-x:auto">
      <table id="top10Table">
        <thead>
          <tr><th>排名</th><th>股票</th><th>现价</th><th>涨跌幅</th><th>评分</th></tr>
        </thead>
        <tbody id="top10Body"></tbody>
      </table>
    </div>
  </div>

  <div class="disclaimer">
    ⚠️ 本工具仅供学习与参考，不构成任何投资建议。股市有风险，投资需谨慎。
  </div>
</div>

<script>
// ─── 技术指标 ──────────────────────────────────────────────────
function ema(arr, n) {
  const k = 2 / (n + 1), res = new Array(arr.length).fill(NaN);
  let start = -1;
  for (let i = 0; i < arr.length; i++) {
    if (!isNaN(arr[i])) { start = i; break; }
  }
  if (start < 0) return res;
  res[start] = arr[start];
  for (let i = start + 1; i < arr.length; i++) {
    res[i] = isNaN(arr[i]) ? NaN : arr[i] * k + res[i-1] * (1 - k);
  }
  return res;
}

function sma(arr, n) {
  const res = new Array(arr.length).fill(NaN);
  for (let i = n - 1; i < arr.length; i++) {
    let s = 0, valid = true;
    for (let j = i - n + 1; j <= i; j++) { if (isNaN(arr[j])) { valid = false; break; } s += arr[j]; }
    if (valid) res[i] = s / n;
  }
  return res;
}

function calcMACD(close) {
  const ema12 = ema(close, 12), ema26 = ema(close, 26);
  const dif = close.map((_, i) => ema12[i] - ema26[i]);
  const dea = ema(dif, 9);
  const hist = dif.map((v, i) => (v - dea[i]) * 2);
  return { dif, dea, hist };
}

function calcRSI(close, n = 14) {
  const res = new Array(close.length).fill(NaN);
  const gains = [], losses = [];
  for (let i = 1; i < close.length; i++) {
    const d = close[i] - close[i-1];
    gains.push(d > 0 ? d : 0);
    losses.push(d < 0 ? -d : 0);
  }
  for (let i = n - 1; i < gains.length; i++) {
    let avgG = 0, avgL = 0;
    for (let j = i - n + 1; j <= i; j++) { avgG += gains[j]; avgL += losses[j]; }
    avgG /= n; avgL /= n;
    res[i + 1] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
  }
  return res;
}

function calcKDJ(high, low, close, n = 9) {
  const k = new Array(close.length).fill(NaN);
  const d = new Array(close.length).fill(NaN);
  const j = new Array(close.length).fill(NaN);
  for (let i = n - 1; i < close.length; i++) {
    let lo = Infinity, hi = -Infinity;
    for (let t = i - n + 1; t <= i; t++) { lo = Math.min(lo, low[t]); hi = Math.max(hi, high[t]); }
    const rsv = hi === lo ? 50 : (close[i] - lo) / (hi - lo) * 100;
    k[i] = i === n - 1 ? rsv : rsv / 3 + k[i-1] * 2 / 3;
    d[i] = i === n - 1 ? k[i] : k[i] / 3 + d[i-1] * 2 / 3;
    j[i] = 3 * k[i] - 2 * d[i];
  }
  return { k, d, j };
}

function calcBoll(close, n = 20) {
  const mid = sma(close, n);
  const upper = new Array(close.length).fill(NaN);
  const lower = new Array(close.length).fill(NaN);
  for (let i = n - 1; i < close.length; i++) {
    let mean = mid[i], variance = 0;
    for (let j = i - n + 1; j <= i; j++) variance += (close[j] - mean) ** 2;
    const std = Math.sqrt(variance / n);
    upper[i] = mean + 2 * std;
    lower[i] = mean - 2 * std;
  }
  return { upper, mid, lower };
}

// ─── 评分 ──────────────────────────────────────────────────────
function scoreStock(klines) {
  if (klines.length < 30) return null;
  const close  = klines.map(k => k.close);
  const high   = klines.map(k => k.high);
  const low    = klines.map(k => k.low);
  const volume = klines.map(k => k.volume);
  const L = close.length, i = L - 1;

  const ma5  = sma(close, 5);
  const ma10 = sma(close, 10);
  const ma20 = sma(close, 20);
  const { dif, dea, hist } = calcMACD(close);
  const rsiArr = calcRSI(close);
  const { j } = calcKDJ(high, low, close);
  const { upper, mid, lower } = calcBoll(close);

  let score = 0;
  const details = {};

  // 均线多头
  const bull = close[i] > ma5[i] && ma5[i] > ma10[i] && ma10[i] > ma20[i];
  if (bull) score += 20;
  details['均线多头排列'] = { val: bull, type: 'bool' };

  // 量能放大
  let vol5 = 0;
  for (let t = i - 5; t < i; t++) vol5 += volume[t];
  vol5 /= 5;
  const surge = volume[i] > vol5 * 1.5;
  if (surge) score += 15;
  details['量能放大'] = { val: surge, type: 'bool' };

  // MACD
  const cross = dif[i] > dea[i];
  const improve = hist[i] > hist[i-1];
  if (cross && improve) score += 20;
  else if (cross || improve) score += 10;
  details['MACD金叉'] = { val: cross, type: 'bool' };
  details['MACD柱改善'] = { val: improve, type: 'bool' };

  // RSI
  const rv = rsiArr[i];
  const rsiOk = !isNaN(rv) && rv >= 40 && rv <= 70;
  if (rsiOk) score += 10;
  details['RSI(14)'] = { val: isNaN(rv) ? null : rv.toFixed(1), type: 'num', ok: rsiOk };

  // KDJ J
  const jv = j[i];
  const jOk = !isNaN(jv) && jv >= 20 && jv <= 85 && jv > j[i-1];
  if (jOk) score += 10;
  details['KDJ_J'] = { val: isNaN(jv) ? null : jv.toFixed(1), type: 'num', ok: jOk };

  // 尾盘强势
  const strength = high[i] > 0 ? close[i] / high[i] : 0;
  if (strength >= 0.95) score += 15;
  else if (strength >= 0.90) score += 7;
  details['尾盘强度'] = { val: (strength * 100).toFixed(1) + '%', type: 'num', ok: strength >= 0.95 };

  // 布林带
  const bu = upper[i], bl2 = lower[i];
  if (!isNaN(bu) && bu > bl2) {
    const pos = (close[i] - bl2) / (bu - bl2);
    if (pos >= 0.4 && pos <= 0.85) score += 10;
    else if (pos >= 0.2 && pos < 0.4) score += 5;
    details['布林带位置'] = { val: (pos * 100).toFixed(0) + '%', type: 'num', ok: pos >= 0.4 && pos <= 0.85 };
  }

  return { score, details };
}

// ─── API 调用 ──────────────────────────────────────────────────
const PROXY = 'https://api.allorigins.win/raw?url=';

async function fetchJSON(url) {
  const r = await fetch(PROXY + encodeURIComponent(url));
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function getStockList() {
  // 东方财富 A 股列表，按成交额排序，取前 60 支
  const url = 'https://push2.eastmoney.com/api/qt/clist/get' +
    '?pn=1&pz=60&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281' +
    '&fltt=2&invt=2&fid=f6' +
    '&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23' +
    '&fields=f2,f3,f6,f12,f13,f14';
  const data = await fetchJSON(url);
  const items = data?.data?.diff || [];
  return items
    .filter(s => {
      const p = s.f2, chg = s.f3, name = s.f14 || '';
      return p >= 3 && p <= 200 && Math.abs(chg) < 9.5 && !name.includes('ST');
    })
    .map(s => ({
      code: s.f12,
      name: s.f14,
      price: s.f2,
      chg: s.f3,
      amount: s.f6,
      market: s.f13,  // 0=深圳 1=上海
    }));
}

async function getKlines(stock) {
  const secid = stock.market + '.' + stock.code;
  const url = 'https://push2his.eastmoney.com/api/qt/stock/kline/get' +
    `?secid=${secid}&fields1=f1,f2,f3,f4,f5,f6` +
    '&fields2=f51,f52,f53,f54,f55,f56,f57,f58' +
    '&klt=101&fqt=1&lmt=65';
  const data = await fetchJSON(url);
  const klines = data?.data?.klines || [];
  return klines.map(line => {
    const p = line.split(',');
    return { date: p[0], open: +p[1], close: +p[2], high: +p[3], low: +p[4], volume: +p[5] };
  }).filter(k => k.close > 0);
}

// ─── UI ────────────────────────────────────────────────────────
function setProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

function renderBest(best) {
  const chgCls = best.chg >= 0 ? 'up' : 'dn';
  const chgSign = best.chg >= 0 ? '+' : '';
  document.getElementById('genTime').textContent =
    '生成时间：' + new Date().toLocaleString('zh-CN');

  document.getElementById('bestContent').innerHTML = `
    <div class="hero">
      <div class="hero-left">
        <div class="name">${best.name}</div>
        <div class="code">${best.market === 1 ? 'SH' : 'SZ'} ${best.code}</div>
      </div>
      <div class="hero-right">
        <div class="price">¥${best.price.toFixed(2)}</div>
        <div class="chg ${chgCls}">${chgSign}${best.chg.toFixed(2)}%</div>
      </div>
    </div>
    <div class="score-section">
      <div class="score-label">综合评分 <span class="score-num">${best.score}</span> / 100</div>
      <div class="score-bar"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
    </div>`;

  document.getElementById('cardBest').style.display = '';
  setTimeout(() => {
    document.getElementById('scoreFill').style.width = best.score + '%';
  }, 50);
}

function renderDetail(details) {
  const grid = document.getElementById('detailGrid');
  grid.innerHTML = Object.entries(details).map(([k, v]) => {
    let valHtml, cls;
    if (v.type === 'bool') {
      valHtml = v.val ? '✅ 是' : '❌ 否';
      cls = v.val ? 'ok' : 'bad';
    } else {
      valHtml = v.val ?? '—';
      cls = v.ok ? 'ok' : 'num';
    }
    return `<div class="detail-item">
      <div class="di-label">${k}</div>
      <div class="di-val ${cls}">${valHtml}</div>
    </div>`;
  }).join('');
  document.getElementById('cardDetail').style.display = '';
}

function renderTop10(list) {
  const tbody = document.getElementById('top10Body');
  tbody.innerHTML = list.map((s, idx) => {
    const rank = idx + 1;
    let badge;
    if (rank === 1) badge = `<span class="rank-badge">1</span>`;
    else if (rank === 2) badge = `<span class="rank-badge s2">2</span>`;
    else if (rank === 3) badge = `<span class="rank-badge s3">3</span>`;
    else badge = `<span class="rank-badge other">${rank}</span>`;
    const chgCls = s.chg >= 0 ? 'up' : 'dn';
    const chgSign = s.chg >= 0 ? '+' : '';
    return `<tr class="${idx === 0 ? 'hl' : ''}">
      <td>${badge}</td>
      <td><b>${s.name}</b><br><small style="color:#aaa">${s.code}</small></td>
      <td>¥${s.price.toFixed(2)}</td>
      <td class="${chgCls}">${chgSign}${s.chg.toFixed(2)}%</td>
      <td>
        <b>${s.score}</b>分
        <div class="mini-bar"><div class="mini-fill" style="width:${s.score}%"></div></div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('cardTop10').style.display = '';
}

// ─── 主流程 ────────────────────────────────────────────────────
async function startPick() {
  const btn = document.getElementById('btnRun');
  const pw = document.getElementById('progressWrap');
  btn.disabled = true;
  btn.textContent = '⏳ 分析中...';
  pw.style.display = '';
  document.getElementById('cardBest').style.display = 'none';
  document.getElementById('cardDetail').style.display = 'none';
  document.getElementById('cardTop10').style.display = 'none';

  try {
    setProgress(5, '获取A股行情列表...');
    const stocks = await getStockList();
    if (!stocks.length) throw new Error('无法获取行情数据，请稍后重试');

    const results = [];
    const total = stocks.length;

    for (let idx = 0; idx < total; idx++) {
      const s = stocks[idx];
      setProgress(5 + Math.floor(idx / total * 85), `评分中 ${idx + 1}/${total}：${s.name}`);

      try {
        const klines = await getKlines(s);
        if (klines.length < 30) continue;
        const res = scoreStock(klines);
        if (!res) continue;
        results.push({ ...s, ...res });
      } catch (e) { /* 跳过单只失败 */ }

      // 小延迟避免请求过快
      await new Promise(r => setTimeout(r, 80));
    }

    if (!results.length) throw new Error('没有符合条件的股票');

    results.sort((a, b) => b.score - a.score);
    const best = results[0];
    const top10 = results.slice(0, 10);

    setProgress(100, '分析完成！');

    renderBest(best);
    renderDetail(best.details);
    renderTop10(top10);

  } catch (e) {
    pw.innerHTML = `<div class="msg-box error">❌ 出错了：${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 重新选股';
  }
}
</script>
</body>
</html>
